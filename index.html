<!doctype html>
<html>

<head>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script
        src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
    <script
        src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <a-scene vr-mode-ui="enabled: false;" loading-screen="enabled: false;"
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" id="scene" embedded gesture-detector>
        <a-assets>
            <a-asset-item id="pine" src="assets/pine_tree.glb"></a-asset-item>
            <a-asset-item id="eucal" src="assets/Eucalyptus.glb"></a-asset-item>
        </a-assets>
        <a-marker type="pattern" preset="custom" url="assets\pattern-eucalyptus-seed.patt"
            raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;" id="markerA">
            <a-entity gltf-model="#eucal" scale="0.1 0.1 0.1" class="clickable" gesture-handler>
            </a-entity>
        </a-marker>
        <a-marker type="pattern" preset="custom" url="assets/pattern-pine.patt" raycaster="objects: .clickable"
            emitevents="true" cursor="fuse: false; rayOrigin: mouse;" id="markerB">
            <a-entity gltf-model="#pine" scale="0.01 0.01 0.01" rotation="0 0 90" class="clickable" gesture-handler>
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
